<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Làm bài</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }
    body {
  background: linear-gradient(135deg, #020617, #0f172a);
  min-height: 100vh;
  overflow-y: auto;        /* 🔥 đổi */
  padding-top: 40px;       /* 🔥 thêm cho đẹp */
}

    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* KHUNG BÀI LÀM */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: none; /* 🔥 giới hạn để không quá to */
      max-height: 90vh;
      overflow-y: auto;
      background: white;
      color: black;
      padding: 20px 40px;
      border-radius: 20px;
      border: 3px solid #3b82f6;
      box-shadow: 0 0 25px rgba(59,130,246,0.4);
      animation: fadeIn 0.8s ease;
      margin: 0 auto; /* 🔥 THÊM DÒNG NÀY */
    }

    h2 {
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .question {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 5px 0;
      cursor: pointer;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #1e3a8a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #1e3a8a;
    }
    #timer {
  position: fixed; /* luôn đứng yên */
  top: 20px;
  right: 20px;
  background: white;
  color: #1e3a8a;
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid #3b82f6;
  font-weight: bold;
  font-size: 18px;
  box-shadow: 0 0 15px rgba(59,130,246,0.4);
  z-index: 999;
  transition: 0.3s;
}

/* khi sắp hết giờ */
.timer-danger {
  color: red !important;
  border-color: red !important;
  box-shadow: 0 0 15px red !important;
}
    #progressText {
  margin: 10px 0;
  font-weight: bold;
  color: #1e3a8a;
}

#progressBar {
  width: 100%;
  height: 10px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #3b82f6, #1e3a8a);
  transition: 0.3s;
}
#progressWrapper {
  position: fixed;
  top: 80px;
  right: 20px;
  width: 220px;
  background: white;
  padding: 10px;
  border-radius: 12px;
  border: 2px solid #3b82f6;
  box-shadow: 0 0 15px rgba(59,130,246,0.4);
  z-index: 999;
}
/* NAV THU GỌN */
#questionNav {
  position: fixed;
  top: 120px;
  right: -220px; /* 🔥 ẩn ra ngoài */
  width: 180px;
  max-height: 60vh;
  overflow-y: auto;
  background: white;
  padding: 10px;
  border-radius: 12px;
  border: 2px solid #3b82f6;
  box-shadow: 0 0 20px rgba(59,130,246,0.5);
  z-index: 9999;
  transition: right 0.3s ease;
}

/* khi mở */
#questionNav.open {
  right: 20px;
}

/* NÚT MỞ */
#toggleNav {
  position: fixed;
  top: 120px;
  right: 20px;
  background: #3b82f6;
  color: white;
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  z-index: 10000;
  font-size: 14px;
}

.q-box {
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #3b82f6;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.q-box:hover {
  background: #dbeafe;
}

.q-done {
  background: #22c55e; /* xanh lá */
  color: white;
}
  /* 🔥 LAYOUT 2 CỘT */
.exam-wrapper {
  display: flex;
  gap: 20px;
}

/* 📄 TƯ LIỆU */
.passage-box {
  width: 45%;
  max-height: 85vh;
  overflow-y: auto;
  background: #f8fafc;
  padding: 15px;
  border-radius: 15px;
  border: 2px solid #3b82f6;
  font-size: 15px;
  line-height: 1.6;
}

/* ❓ CÂU HỎI */
.question-box {
  width: 55%;
  max-height: 85vh;
  overflow-y: auto;
  font-size: 16px;
}

/* 📱 MOBILE → quay lại 1 cột */
@media (max-width: 768px) {
  .exam-wrapper {
    flex-direction: column;
  }

  .passage-box,
  .question-box {
    width: 100%;
    max-height: none;
  }
}
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>
<div id="toggleNav">☰</div>
<div id="particles"></div>
<div id="timer">90:00</div>
<div id="questionNav"></div>
  <div id="progressText">Đã làm: 0/0 câu</div>
<div id="progressBar">
  <div id="progressFill"></div>
</div>
<div class="container">

  <h2 id="welcome"></h2>

  <div class="exam-wrapper">
    <div id="passageArea" class="passage-box"></div>
    <div id="quiz" class="question-box"></div>
  </div>

  <button onclick="submitTest()">Nộp bài</button>
  <div id="result"></div>

</div>

<script>
const originalQuestions = [
  {
    passage: ``,

    questions: [
      {
        question: "",
        options: ["A. .", "B. .", "C. .", "D. ."],
        answer: 
      },
    };
  {
    passage:``,
    questions: [
  {
  question: ``,
  type: "short",
  answer: ""
},
  ]
  },
  {
  passage:"",
  questions: [
    {
  question: ``,
  type: "multi",
  options: [
    "(1) .",
    "(2) .",
    "(3) .",
    "(4) ."
  ],
  answer: [, ] // 🔥 các đáp án đúng
    }
    ]
}
]
const studentID = localStorage.getItem("studentID");
// 🔥 RESET TOÀN BỘ ĐÁP ÁN CŨ KHI VÀO BÀI
Object.keys(localStorage).forEach(key => {
  if (key.startsWith("q")) {
    localStorage.removeItem(key);
  }
});
if (!studentID) {
  alert("Chưa đăng nhập!");
  window.location.href = "login.html";
}

function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getSeedFromString(str) {
  return str.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
}

function shuffleWithSeed(array, seed) {
  let arr = [...array];
  let currentIndex = arr.length;

  while (currentIndex !== 0) {
    let randomIndex = Math.floor(seededRandom(seed++) * currentIndex);
    currentIndex--;

    [arr[currentIndex], arr[randomIndex]] = [
      arr[randomIndex], arr[currentIndex]
    ];
  }

  return arr;
}

const seed = getSeedFromString(studentID);
const questions = shuffleWithSeed(originalQuestions, seed);
  let finalQuestions = [];
  let passageMap = [];

document.getElementById("welcome").innerText = "Mã học sinh: " + studentID;

const quizDiv = document.getElementById("quiz");
const passageArea = document.getElementById("passageArea"); // ✅ thêm dòng này

questions.forEach((group, groupIndex) => {

  // 🔥 XÁO TRỘN CÂU TRONG GROUP
const shuffledQuestions = shuffleWithSeed(group.questions, seed + groupIndex);

shuffledQuestions.forEach((q, index) => {

  const qIndex = finalQuestions.length; // index thật
  finalQuestions.push(q); // lưu thứ tự chuẩn
  passageMap[qIndex] = group.passage || "";

  const saved = localStorage.getItem("q" + qIndex);

  const div = document.createElement("div");
div.classList.add("question");

if (q.type === "short") {
  const savedText = localStorage.getItem("q" + qIndex) || "";

  div.innerHTML = `
    <p><b>Câu ${qIndex + 1}:</b> ${q.question}</p>
    <input type="text"
      value="${savedText}"
      placeholder="Nhập câu trả lời..."
      oninput="saveAnswer(${qIndex}, this.value)"
      style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc;">
  `;
}

else if (q.type === "multi") {
  let savedArr;

try {
  savedArr = JSON.parse(localStorage.getItem("q" + qIndex));
  if (!Array.isArray(savedArr)) savedArr = [];
} catch {
  savedArr = [];
}

  div.innerHTML = `
    <p><b>Câu ${qIndex + 1}:</b> ${q.question}</p>
    ${q.options.map((opt, i) => `
      <label>
        <input type="checkbox"
  ${savedArr.includes(i) ? "checked disabled" : ""}
  onchange="saveMulti(${qIndex}, ${i}, this.checked)">
        ${opt}
      </label>
    `).join("")}
  `;
}

else {
  const saved = localStorage.getItem("q" + qIndex);

  div.innerHTML = `
    <p><b>Câu ${qIndex + 1}:</b> ${q.question}</p>
    ${q.options.map((opt, i) => `
      <label>
        <input type="radio" name="q${qIndex}" value="${i}"
          ${saved == i ? "checked" : ""}
          onchange="saveAnswer(${qIndex}, ${i})">
        ${opt}
      </label>
    `).join("")}
  `;
}
  quizDiv.appendChild(div);
});

});
  createQuestionNav(); // ✅ đúng vị trí
  updateProgress();
  // 🔥 THÊM NGAY DƯỚI ĐÂY
passageArea.innerHTML = passageMap[0]
  ? `<b>📄 Tư liệu:</b><br>${passageMap[0]}`
  : "<i>Không có tư liệu</i>";

  function saveMulti(qIndex, value, checked) {
  let arr = JSON.parse(localStorage.getItem("q" + qIndex) || "[]");

  if (checked) {
    if (!arr.includes(value)) arr.push(value);
  } else {
    arr = arr.filter(v => v !== value);
  }

  localStorage.setItem("q" + qIndex, JSON.stringify(arr));
  updateProgress();
}

function saveAnswer(qIndex, value) {
  localStorage.setItem("q" + qIndex, value);
  updateProgress(); // 🔥 thêm dòng này
}
function createQuestionNav() {
  const nav = document.getElementById("questionNav");
  nav.innerHTML = "";

  finalQuestions.forEach((q, index) => {
    const box = document.createElement("div");
    box.classList.add("q-box");
    box.innerText = index + 1;

    // click → nhảy tới câu
box.onclick = () => {
  const questions = document.querySelectorAll(".question");

  if (questions[index]) {
    questions[index].scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }

  nav.classList.remove("open"); // 🔥 auto đóng
};

    nav.appendChild(box);
  });

  updateNav();
}
function updateProgress() {
  let answered = 0;

  finalQuestions.forEach((q, index) => {
    if (localStorage.getItem("q" + index) !== null) {
      answered++;
    }
  });

  const total = finalQuestions.length;

  document.getElementById("progressText").innerText =
    `Đã làm: ${answered}/${total} câu`;

  document.getElementById("progressFill").style.width =
    (answered / total) * 100 + "%";

  updateNav(); // 🔥 thêm dòng này
}
  function updateNav() {
  const boxes = document.querySelectorAll(".q-box");

  boxes.forEach((box, index) => {
    if (localStorage.getItem("q" + index) !== null) {
      box.classList.add("q-done");
    } else {
      box.classList.remove("q-done");
    }
  });
}
function submitTest() {
  clearInterval(countdown);
  localStorage.removeItem("startTime_" + studentID);

  let score = 0;
  let answers = [];
  let wrongAnswers = []; // ✅ lưu câu sai + chưa làm

  finalQuestions.forEach((q, index) => {
    const selected = localStorage.getItem("q" + index);

    answers.push(selected ?? "");

    let isCorrect = false;

    if (selected !== null) {

      // ✅ SHORT
      if (q.type === "short") {
        const normalize = (str) =>
          str.trim().toLowerCase().replace(/\s+/g, "");

        isCorrect = normalize(selected) === normalize(q.answer);
      }

      // ✅ MULTI
      else if (q.type === "multi") {
        const userArr = JSON.parse(selected);
        const correctArr = q.answer;

        isCorrect =
          userArr.length === correctArr.length &&
          userArr.every(v => correctArr.includes(v));
      }

      // ✅ RADIO
      else {
        isCorrect = parseInt(selected) === q.answer;
      }

      if (isCorrect) {
        score++;
      } else {
        wrongAnswers.push(`Câu ${index + 1}`);
      }

    } else {
      // ❗ CHƯA LÀM → cũng tính là sai
      wrongAnswers.push(`Câu ${index + 1}`);
    }

    // ✅ XÓA SAU MỖI CÂU
    localStorage.removeItem("q" + index);
  });

  localStorage.setItem("done_" + studentID, "true");

  // ✅ GỬI GOOGLE FORM
  fetch("https://docs.google.com/forms/d/e/1FAIpQLSc1ejUfShEJzqJWp58ySPLhDhknNxoceffdrsAxTCWSUHPd-A/formResponse", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "entry.2035902982=" + studentID +
      "&entry.1761120594=" + score +
      "&entry.79167874=" + answers.join(",") +
      "&entry.2105048205=" + wrongAnswers.join(", ")
  });

  alert("🎉 Chúc mừng bạn đã hoàn thành bài thi!");
  window.location.href = "index.html";
};

// particles nhẹ
tsParticles.load("particles", {
  particles: {
    number: { value: 20 }, // giảm luôn cho nhẹ
    color: { value: "#3b82f6" },
    size: { value: 2 },

    move: { enable: false }, // ❌ tắt chuyển động
    links: { enable: false } // ❌ tắt nối dây
  }
});
  // tổng thời gian (5 phút)
const TOTAL_TIME = 5400;

// lấy thời điểm bắt đầu (lưu lại)
const key = "startTime_" + studentID;

let startTime = localStorage.getItem(key);

if (!startTime) {
  startTime = Date.now();
  localStorage.setItem(key, startTime);
}
const timerEl = document.getElementById("timer");

const countdown = setInterval(() => {
  const now = Date.now();
  const elapsed = Math.floor((now - startTime) / 1000);
  let timeLeft = TOTAL_TIME - elapsed;

  if (timeLeft < 0) timeLeft = 0;

  let minutes = Math.floor(timeLeft / 60);
  let seconds = timeLeft % 60;

  minutes = minutes < 10 ? "0" + minutes : minutes;
  seconds = seconds < 10 ? "0" + seconds : seconds;

  timerEl.innerText = minutes + ":" + seconds;

  // 🔴 đổi màu khi còn < 60s
  if (timeLeft <= 60) {
    timerEl.classList.add("timer-danger");
  }

  // hết giờ
  if (timeLeft === 0) {
    clearInterval(countdown);
    alert("Hết giờ!");
    localStorage.removeItem("startTime_" + studentID); // reset cho lần sau
    submitTest();
  }

}, 1000);

quizDiv.addEventListener("scroll", () => {
  const questions = document.querySelectorAll(".question");

  let currentIndex = 0;

  questions.forEach((q, index) => {
    if (q.offsetTop - quizDiv.scrollTop < quizDiv.clientHeight / 2) {
      currentIndex = index;
    }
  });

  passageArea.innerHTML = passageMap[currentIndex]
    ? `<b>📄 Tư liệu:</b><br>${passageMap[currentIndex]}`
    : "<i>Không có tư liệu</i>";
});

  // chặn copy
document.addEventListener("copy", e => {
  e.preventDefault();
});

// chặn paste
document.addEventListener("paste", e => {
  e.preventDefault();
});

// chặn cut
document.addEventListener("cut", e => {
  e.preventDefault();
});

// chặn chuột phải
document.addEventListener("contextmenu", e => {
  e.preventDefault();
});

// chặn phím
document.addEventListener("keydown", e => {
  if (
    (e.ctrlKey && ["c","v","u","s"].includes(e.key.toLowerCase())) ||
    e.key === "F12"
  ) {
    e.preventDefault();
  }
});
  const toggleBtn = document.getElementById("toggleNav");
const nav = document.getElementById("questionNav");

toggleBtn.onclick = () => {
  nav.classList.toggle("open");
};
</script>

</body>
</html>
