<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hóa học</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* floating chemical symbols */
    .element {
      position: absolute;
      color: #38bdf8;
      font-weight: bold;
      opacity: 0.3;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
      }
      to {
        transform: translateY(-100vh);
      }
    }

    /* Atom */
    .atom {
      position: relative;
      width: 120px;
      height: 120px;
      margin: auto;
      margin-bottom: 20px;
    }

    .nucleus {
      width: 20px;
      height: 20px;
      background: #3b82f6;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #3b82f6;
    }

    .orbit {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 50%;
      animation: rotate 6s linear infinite;
    }

    .electron {
      width: 10px;
      height: 10px;
      background: #60a5fa;
      border-radius: 50%;
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px #60a5fa;
    }

    .orbit:nth-child(2) { animation-duration: 4s; }
    .orbit:nth-child(3) { animation-duration: 8s; }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(15,23,42,0.85);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 350px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(59,130,246,0.3);
      animation: fadeIn 1s ease;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .icons {
      font-size: 24px;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #3b82f6, #1e3a8a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px #3b82f6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div id="particles"></div>

<!-- floating elements -->
<script>
const elements = ["H","O","Na","Cl","Fe","Ca","K","Mg","CO2","NH3"];

for (let i = 0; i < 20; i++) {
  const el = document.createElement("div");
  el.className = "element";
  el.innerText = elements[Math.floor(Math.random() * elements.length)];
  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 20 + 14) + "px";
  el.style.animationDuration = (Math.random() * 10 + 5) + "s";
  document.body.appendChild(el);
}
</script>

<div class="card">

  <div class="icons">🧪 ⚛️ 🔬</div>

  <div class="atom">
    <div class="orbit"><div class="electron"></div></div>
    <div class="orbit"><div class="electron"></div></div>
    <div class="orbit"><div class="electron"></div></div>
    <div class="nucleus"></div>
  </div>

  <h1>Bài kiểm tra Hóa học THPT LẦN I</h1>
  <p>Hệ thống đang sẵn sàng...</p>

  <button onclick="goLogin()">Bắt đầu</button>

</div>

<script>
function goLogin() {
  window.location.href = "login.html";
}

tsParticles.load("particles", {
  particles: {
    number: { value: 60 },
    color: { value: "#38bdf8" },
    size: { value: 2 },
    move: { enable: true, speed: 1 },
    links: {
      enable: true,
      color: "#38bdf8",
      opacity: 0.2
    }
  }
});
</script>

</body>
</html>
